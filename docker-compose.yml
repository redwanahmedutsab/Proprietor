services:
  db:
    image: postgres:15-alpine
    container_name: proprietor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-realestate_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-realestate_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: proprietor_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}

      DB_NAME: ${DB_NAME:-realestate_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID:-testbox}
      SSLCOMMERZ_STORE_PASS: ${SSLCOMMERZ_STORE_PASS:-qwerty}
      SSLCOMMERZ_SANDBOX: ${SSLCOMMERZ_SANDBOX:-True}

      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}

      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@proprietor.local}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin12345}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"

  ml_service:
    build:
      context: ./ml_service
    container_name: proprietor_ml_service
    restart: unless-stopped
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FORCE_RETRAIN: ${FORCE_RETRAIN:-false}
    volumes:
      - ml_models:/app/models
    ports:
      - "8001:8001"
    # First boot trains both models from the CSVs baked into the image
    # (a few minutes); later boots reuse the artifacts in the ml_models volume.

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000/api}
        REACT_APP_ML_API_URL: ${REACT_APP_ML_API_URL:-http://localhost:8001}
    container_name: proprietor_frontend
    restart: unless-stopped
    depends_on:
      - backend
      - ml_service
    ports:
      - "3000:80"

volumes:
  postgres_data:
  media_data:
  static_data:
  ml_models:

