services:
  - type: web
    name: proprietor-backend
    env: python
    pythonVersion: "3.12.0"
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_NAME
        value: "neondb"
      - key: DB_USER
        value: "neondb_owner"
      - key: DB_PASSWORD
        value: "npg_C0yxonf6jpFE"
      - key: DB_HOST
        value: "ep-nameless-wave-amfwxk3v-pooler.c-5.us-east-1.aws.neon.tech"
      - key: DB_PORT
        value: "5432"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://proprietor.vercel.app"
      - key: FRONTEND_URL
        value: "https://proprietor.vercel.app"
      - key: SSLCOMMERZ_STORE_ID
        value: "testbox"
      - key: SSLCOMMERZ_STORE_PASS
        value: "qwerty"
      - key: SSLCOMMERZ_SANDBOX
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false